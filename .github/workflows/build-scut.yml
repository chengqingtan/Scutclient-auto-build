name: Build scutclient for GL-MT3600BE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev swig python3-pyelftools python3-setuptools

      - name: Download SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/23.05.0/targets/mediatek/filogic/openwrt-sdk-23.05.0-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          curl -L $SDK_URL -o sdk.tar.xz
          tar -xJ -f sdk.tar.xz --strip-components=1

      - name: Update and Install Feeds
        run: |
          ./scripts/feeds update -a
          rm -rf feeds/packages/lang/python/pymysql
          ./scripts/feeds install -a

      - name: Add and Fix Scutclient Source
        run: |
          # 1. 处理 scutclient 核心程序
          git clone https://github.com/scutclient/scutclient.git package/scutclient-temp
          mkdir -p package/scutclient
          # 将真正包含 OpenWrt Makefile 的目录内容移出来
          cp -r package/scutclient-temp/source/openwrt/* package/scutclient/
          # 将源码本体也复制进去，因为 Makefile 里通常会引用相对路径
          cp -r package/scutclient-temp/source/* package/scutclient/
          
          # 2. 处理 LuCI 界面
          git clone https://github.com/scutclient/luci-app-scutclient.git package/luci-app-scutclient

      - name: Configure and Compile
        run: |
          # 强制刷新配置
          rm -f .config
          make defconfig
          
          # 检查包是否被识别（如果识别到了，grep 会有输出）
          ./scripts/feeds list | grep scutclient || true
          
          # 尝试启用并编译
          echo "CONFIG_PACKAGE_scutclient=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-scutclient=m" >> .config
          make defconfig
          
          # 编译
          make package/scutclient/compile V=s
          make package/luci-app-scutclient/compile V=s

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scutclient-ipks
          path: bin/packages/**/*.ipk
