name: Build scutclient for GL-MT3600BE

on:
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev swig python3-pyelftools python3-setuptools

      - name: Download SDK
        run: |
          # 更新为官方 23.05 稳定版 SDK 链接，支持 MT7986 (Filogic 830)
          SDK_URL="https://downloads.openwrt.org/releases/23.05.0/targets/mediatek/filogic/openwrt-sdk-23.05.0-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          curl -L $SDK_URL -o sdk.tar.xz
          # 检查文件是否下载成功（避免下载到 HTML 404 页面）
          file sdk.tar.xz
          tar -xJ -f sdk.tar.xz --strip-components=1

      - name: Update and Install Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add Scutclient Source
        run: |
          # 克隆插件源码到 SDK 的 package 目录
          cd package
          git clone https://github.com/scutclient/scutclient.git
          git clone https://github.com/scutclient/luci-app-scutclient.git

      - name: Configure and Compile
        run: |
          # 生成基础配置
          make defconfig
          # 强制选中这两个插件进行编译 (m 代表编译为独立 ipk)
          echo "CONFIG_PACKAGE_scutclient=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-scutclient=m" >> .config
          
          # 编译核心程序和 LuCI 界面
          make package/scutclient/compile V=s
          make package/luci-app-scutclient/compile V=s

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scutclient-ipks
          path: bin/packages/aarch64_cortex-a53/**/*.ipk
